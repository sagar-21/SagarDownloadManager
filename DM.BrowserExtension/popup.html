<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sagar Download Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 360px;
    min-height: 80px; max-height: 520px;
    background: #12121c; color: #e2e2f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Header */
  .hdr {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 13px 10px;
    background: #0c0c18;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .logo {
    width: 26px; height: 26px;
    background: linear-gradient(135deg,#2563eb,#1e40af);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 2px 10px rgba(37,99,235,0.40);
  }
  .hdr-text { flex:1; font-size:13px; font-weight:700; color:#e2e2f0; letter-spacing:-0.01em; }
  .badge {
    background:#2563eb; color:#fff;
    font-size:10px; font-weight:800;
    padding:2px 7px; border-radius:10px;
    min-width:22px; text-align:center;
  }
  .badge.hidden { display:none; }

  /* Status */
  .status-bar {
    display:flex; align-items:center; gap:7px;
    padding:6px 13px;
    background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:11.5px; color:rgba(255,255,255,0.50);
    flex-shrink:0;
  }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot.green { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.6); }
  .dot.red   { background:#ef4444; }
  .dot.pulse { background:#64748b; animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* Media list */
  .media-list { flex:1; overflow-y:auto; }
  .media-list::-webkit-scrollbar { width:3px; }
  .media-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.14); border-radius:4px; }

  .media-item {
    padding:9px 12px;
    border-bottom:1px solid rgba(255,255,255,0.045);
    transition:background 0.12s;
  }
  .media-item:hover { background:rgba(255,255,255,0.03); }
  .media-item:last-child { border-bottom:none; }

  /* Top row: badge + name */
  .item-top {
    display:flex; align-items:center; gap:8px;
    margin-bottom:7px;
  }
  .type-badge {
    font-size:9px; font-weight:800;
    letter-spacing:0.07em; text-transform:uppercase;
    padding:2px 6px; border-radius:4px; flex-shrink:0;
  }
  .type-video { background:rgba(124,58,237,0.18); color:#a78bfa; border:1px solid rgba(124,58,237,0.30); }
  .type-audio { background:rgba(37,99,235,0.18);  color:#60a5fa; border:1px solid rgba(37,99,235,0.30); }
  .item-name {
    flex:1; min-width:0; font-size:12.5px; color:#c4c4d8;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* Quality row */
  .item-bottom { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .q-btn {
    padding:3px 9px;
    font-size:10.5px; font-weight:700;
    border-radius:5px; cursor:pointer;
    border:1px solid rgba(255,255,255,0.13);
    background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.65);
    transition:background 0.12s, border-color 0.12s, color 0.12s;
    flex-shrink:0;
  }
  .q-btn:hover { background:#2563eb; border-color:#2563eb; color:#fff; }
  .q-btn.best { color:#60a5fa; border-color:rgba(37,99,235,0.35); }
  .q-btn.mp3  { color:#a78bfa; border-color:rgba(124,58,237,0.35); }
  .q-btn.done { background:rgba(34,197,94,0.18); border-color:rgba(34,197,94,0.40); color:#4ade80; }
  .q-btn.err  { background:rgba(239,68,68,0.18); border-color:rgba(239,68,68,0.40); color:#f87171; }
  .q-btn:disabled { opacity:0.4; cursor:default; }

  /* Empty */
  .empty {
    padding:28px 16px; text-align:center;
    color:rgba(255,255,255,0.28); font-size:12px; line-height:1.7;
  }
  .empty svg { opacity:0.22; margin-bottom:10px; display:block; margin-inline:auto; }

  /* Page download btn */
  .page-btn {
    margin:10px 12px; padding:8px;
    background:rgba(37,99,235,0.13);
    border:1px solid rgba(37,99,235,0.28);
    border-radius:8px; color:#60a5fa;
    font-size:12px; font-weight:600;
    cursor:pointer; text-align:center;
    transition:background 0.12s; flex-shrink:0;
  }
  .page-btn:hover:not(:disabled) { background:rgba(37,99,235,0.26); }
  .page-btn:disabled { opacity:0.35; cursor:default; }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </div>
  <div class="hdr-text">Download Manager</div>
  <div class="badge hidden" id="badge">0</div>
</div>

<div class="status-bar">
  <div class="dot pulse" id="dot"></div>
  <span id="status-text">Connecting…</span>
</div>

<div class="media-list" id="media-list">
  <div class="empty" id="empty-state">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 10l5 5-5 5"/><path d="M4 4v7a4 4 0 0 0 4 4h11"/>
    </svg>
    No media detected on this page
  </div>
</div>

<button class="page-btn" id="page-btn" disabled>↓ Download This Page</button>

<script src="popup.js"></script>
</body>
</html>
