<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      min-height: 120px;
      background: #12161e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-title { font-weight: 600; font-size: 14px; flex: 1; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    .status-dot.connected { background: #4CAF50; }
    .status-dot.error     { background: #f44336; }

    .status-text { font-size: 11px; color: rgba(255,255,255,0.45); }

    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      padding: 10px 16px 5px;
    }

    .media-list { padding: 0 0 8px; }

    .media-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      transition: background 0.12s;
    }
    .media-row:hover { background: rgba(255,255,255,0.05); }

    .media-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
      background: rgba(126,200,227,0.18); color: #7EC8E3;
    }
    .media-label.stream {
      background: rgba(255,165,80,0.18); color: #FFA550;
    }

    .media-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 12px; color: rgba(255,255,255,0.80);
    }

    .dl-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.55); cursor: pointer; border-radius: 5px;
      padding: 3px 7px; font-size: 12px; flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .dl-btn:hover { background: #7EC8E3; border-color: #7EC8E3; color: #0e1420; }

    .empty {
      padding: 20px 16px; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 12px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 11px; color: rgba(255,255,255,0.30);
    }

    #status-msg { font-size: 11px; padding: 6px 16px; color: #7EC8E3; display: none; }
    #status-msg.err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="dot"></div>
    <span class="header-title">Download Manager</span>
    <span class="status-text" id="app-status">Checking…</span>
  </div>

  <div class="section-label">DETECTED ON THIS TAB</div>
  <div class="media-list" id="media-list">
    <div class="empty" id="empty-msg">Loading…</div>
  </div>

  <div id="status-msg"></div>

  <div class="footer">Extension v1.0 &nbsp;·&nbsp; Port 6336</div>

  <script src="popup.js"></script>
</body>
</html>
